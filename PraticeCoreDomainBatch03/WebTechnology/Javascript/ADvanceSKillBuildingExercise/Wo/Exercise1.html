<!DOCTYPE html>
<html>
<head>
    <title>Canvas Drawing App</title>
    <style>
        body {
            margin: 0;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .container {
            text-align: center;
        }

        canvas {
            border: 2px solid #333;
            background: white;
            cursor: crosshair;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Canvas Drawing Board</h2>
    <canvas id="drawingBoard" width="500" height="400"></canvas>
    <br>
    <button onclick="clearCanvas()">Clear</button>
</div>

<script>
    const canvas = document.getElementById("drawingBoard");
    const ctx = canvas.getContext("2d");

    let isDrawing = false;

    // Start Drawing
    canvas.addEventListener("mousedown", () => {
        isDrawing = true;
        ctx.beginPath();
    });

    // Stop Drawing
    canvas.addEventListener("mouseup", () => {
        isDrawing = false;
    });

    canvas.addEventListener("mouseleave", () => {
        isDrawing = false;
    });

    // Drawing Logic
    canvas.addEventListener("mousemove", (e) => {
        if (!isDrawing) return;

        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        ctx.lineWidth = 2;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#000";

        ctx.lineTo(x, y);
        ctx.stroke();
    });

    // Clear Canvas
    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
</script>

</body>
</html>
