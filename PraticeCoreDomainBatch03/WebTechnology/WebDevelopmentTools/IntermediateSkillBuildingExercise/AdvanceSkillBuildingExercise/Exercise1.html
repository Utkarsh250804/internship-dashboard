<!DOCTYPE html>
<html>

<head>
<title>Countdown Timer</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin-top:100px;
}

.timer{
font-size:60px;
margin-bottom:20px;
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Countdown Timer</h1>

<div class="timer" id="timer">10:00</div>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>

<script>

let time = 600; // 10 minutes = 600 seconds
let interval;

function updateDisplay(){

let minutes = Math.floor(time / 60);
let seconds = time % 60;

minutes = minutes < 10 ? "0" + minutes : minutes;
seconds = seconds < 10 ? "0" + seconds : seconds;

document.getElementById("timer").innerText = minutes + ":" + seconds;

}

function startTimer(){

if(!interval){

interval = setInterval(function(){

if(time > 0){

time--;
updateDisplay();

}else{

clearInterval(interval);
alert("Time's up!");

}

},1000);

}

}

function pauseTimer(){

clearInterval(interval);
interval = null;

}

function resetTimer(){

clearInterval(interval);
interval = null;
time = 600;
updateDisplay();

}

</script>

</body>

</html>
