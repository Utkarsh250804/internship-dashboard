<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>

    <style>
        .gallery {
            display: flex;
            flex-wrap: wrap;
        }

        .gallery img {
            width: 33%;
            padding: 5px;
        }

        /* Mobile view */
        @media (max-width: 600px) {
            .gallery img {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <h2>My Image Gallery</h2>

    <div class="gallery">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=600" alt="Nature">
        <img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d?w=600" alt="Mountains">
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=600" alt="Forest">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600" alt="Beach">
        <img src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=600" alt="City">
        <img src="https://images.unsplash.com/photo-1503264116251-35a269479413?w=600" alt="Road">
    </div>

</body>
</html>
