<!DOCTYPE html>
<html>
<head>
    <title>Card Component</title>
    <style>
        /* CSS VARIABLES */
        :root {
            --card-bg: #ffffff;
            --card-radius: 12px;
            --card-padding: 20px;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.1);
            --primary-color: #4f46e5;
            --text-color: #333;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 20px;
        }

        /* CARD COMPONENT */
        .card {
            background: var(--card-bg);
            border-radius: var(--card-radius);
            padding: var(--card-padding);
            box-shadow: var(--card-shadow);
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .card-content {
            color: var(--text-color);
            font-size: 14px;
            flex-grow: 1;
        }

        .card-button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: var(--primary-color);
            color: white;
            cursor: pointer;
        }

        .card-button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-title">Card Title</div>
        <div class="card-content">
            This is a reusable card component using CSS variables.
        </div>
        <button class="card-button">Read More</button>
    </div>

    <div class="card">
        <div class="card-title">Another Card</div>
        <div class="card-content">
            You can reuse this component anywhere and control design from root variables.
        </div>
        <button class="card-button">Explore</button>
    </div>

</body>
</html>
