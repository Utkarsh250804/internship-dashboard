<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Image Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">

<div class="container py-5">

    <!-- Header + Theme Toggle -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Responsive Image Gallery</h2>
        <button class="btn btn-outline-secondary" onclick="toggleTheme()">Toggle Theme</button>
    </div>

    <!-- Image Grid -->
    <div class="row g-4">

        <div class="col-12 col-lg-6">
            <img src="https://picsum.photos/id/1015/600/400" 
                 class="img-fluid rounded shadow" 
                 alt="Mountain Landscape"
                 data-bs-toggle="modal"
                 data-bs-target="#imageModal"
                 onclick="openModal(0)">
        </div>

        <div class="col-12 col-lg-6">
            <img src="https://picsum.photos/id/1025/600/400"
                 class="img-fluid rounded shadow"
                 alt="Beautiful Dog"
                 data-bs-toggle="modal"
                 data-bs-target="#imageModal"
                 onclick="openModal(1)">
        </div>

        <div class="col-12 col-lg-6">
            <img src="https://picsum.photos/id/1043/600/400"
                 class="img-fluid rounded shadow"
                 alt="Forest View"
                 data-bs-toggle="modal"
                 data-bs-target="#imageModal"
                 onclick="openModal(2)">
        </div>

        <div class="col-12 col-lg-6">
            <img src="https://picsum.photos/id/1050/600/400"
                 class="img-fluid rounded shadow"
                 alt="Beach Sunset"
                 data-bs-toggle="modal"
                 data-bs-target="#imageModal"
                 onclick="openModal(3)">
        </div>

    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="imageModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="modalCaption"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">
        <img id="modalImage" class="img-fluid rounded">
      </div>

      <div class="modal-footer justify-content-between">
        <button class="btn btn-secondary" onclick="prevImage()">Previous</button>
        <button class="btn btn-primary" onclick="nextImage()">Next</button>
      </div>

    </div>
  </div>
</div>

<script>
    const images = [
        {
            src: "https://picsum.photos/id/1015/900/600",
            caption: "Mountain Landscape"
        },
        {
            src: "https://picsum.photos/id/1025/900/600",
            caption: "Beautiful Dog"
        },
        {
            src: "https://picsum.photos/id/1043/900/600",
            caption: "Forest View"
        },
        {
            src: "https://picsum.photos/id/1050/900/600",
            caption: "Beach Sunset"
        }
    ];

    let currentIndex = 0;

    function openModal(index) {
        currentIndex = index;
        updateModal();
    }

    function updateModal() {
        document.getElementById("modalImage").src = images[currentIndex].src;
        document.getElementById("modalCaption").textContent = images[currentIndex].caption;
    }

    function nextImage() {
        currentIndex = (currentIndex + 1) % images.length;
        updateModal();
    }

    function prevImage() {
        currentIndex = (currentIndex - 1 + images.length) % images.length;
        updateModal();
    }

    function toggleTheme() {
        const body = document.body;
        body.classList.toggle("bg-dark");
        body.classList.toggle("text-light");
        body.classList.toggle("bg-light");
        body.classList.toggle("text-dark");
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
