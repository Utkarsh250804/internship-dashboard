<!DOCTYPE html>
<html>
<head>
    <title>Pricing Section</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-5">Pricing Plans</h2>

    <div class="row g-4">

        <!-- Basic Plan -->
        <div class="col-12 col-lg-4">
            <div class="card text-center h-100 shadow">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Basic</h5>
                    <h3 class="text-primary">$9/month</h3>
                    <ul class="list-unstyled my-3">
                        <li>✔ 5 Projects</li>
                        <li>✔ Basic Support</li>
                        <li>✔ Email Access</li>
                    </ul>
                    <a href="#" class="btn btn-outline-primary mt-auto">Sign Up</a>
                </div>
            </div>
        </div>

        <!-- Standard Plan -->
        <div class="col-12 col-lg-4">
            <div class="card text-center h-100 shadow-lg border-primary">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Standard</h5>
                    <h3 class="text-primary">$29/month</h3>
                    <ul class="list-unstyled my-3">
                        <li>✔ 20 Projects</li>
                        <li>✔ Priority Support</li>
                        <li>✔ Analytics</li>
                    </ul>
                    <a href="#" class="btn btn-primary mt-auto">Sign Up</a>
                </div>
            </div>
        </div>

        <!-- Premium Plan -->
        <div class="col-12 col-lg-4">
            <div class="card text-center h-100 shadow">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Premium</h5>
                    <h3 class="text-primary">$49/month</h3>
                    <ul class="list-unstyled my-3">
                        <li>✔ Unlimited Projects</li>
                        <li>✔ 24/7 Support</li>
                        <li>✔ Advanced Analytics</li>
                    </ul>
                    <a href="#" class="btn btn-outline-primary mt-auto">Sign Up</a>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
